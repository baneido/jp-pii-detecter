name: ci
on:
  push:
    branches: [main]
  pull_request:

# 同一ブランチ/PR の古い進行中ランを新しいランで置き換え、無駄な実行を避ける
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# GITHUB_TOKEN の権限を最小化する（リポジトリの読み取りのみ必要）
permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # 認証情報を作業ツリーに残さない（以降の手順は読み取りのみ）
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - run: go vet ./...
      # -race: 並列スキャン（internal/source）のデータ競合の回帰防止
      - run: go test -race ./...
      # docs/accuracy.md が実測値からドリフトしていないことを検証する
      - run: |
          go test ./internal/eval -run TestGenerateDoc -update
          git diff --exit-code docs/accuracy.md
      - run: go build ./cmd/jp-pii-detect
      # dogfooding: 自リポジトリを自分でスキャンして偽陽性ゼロを保証する
      - run: ./jp-pii-detect scan --format github .
